<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>netnslab topology UI</title>
    <link rel="stylesheet" href="/ui/styles.css" />
    <link rel="stylesheet" href="/ui/vendor/xterm.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">netnslab UI</div>

      <div class="controls">
        <label class="control">
          Lab:
          <select id="labSelect"></select>
        </label>
        <button id="refreshBtn" class="btn">Refresh</button>
        <label class="control">
          Layout:
          <select id="layoutSelect">
            <option value="cose">cose</option>
            <option value="circle">circle</option>
            <option value="grid">grid</option>
            <option value="concentric">concentric</option>
            <option value="breadthfirst">breadthfirst</option>
          </select>
        </label>
        <button id="relayoutBtn" class="btn">Relayout</button>
        <label class="control">
          <input id="autoRefresh" type="checkbox" checked />
          Auto refresh
        </label>
        <label class="control">
          <input id="liveToggle" type="checkbox" checked />
          Live Details
        </label>
        <label class="control">
          View:
          <select id="viewModeSelect">
            <option value="topo">Topology</option>
            <option value="terminal">Terminal</option>
          </select>
        </label>
      </div>

      <div class="meta">
        <span id="status">--</span>
      </div>
    </header>

    <main class="fixed-layout">
      <!-- Left: Nodes -->
      <aside class="panel nodes-pane">
        <h3>Nodes</h3>
        <div id="nodesList" class="nodes"></div>
      </aside>

      <!-- Center: Topology or Terminal -->
      <section class="panel center-pane">
        <div id="topoView" class="center-view">
          <div class="graph-title">
            Topology
            <span id="graphHint" class="hint">(Cytoscape layout)</span>
          </div>
          <div id="topologyGraph" class="topology"></div>
        </div>

        <div id="terminalView" class="center-view hidden">
          <div class="terminal-tabs-bar">
            <div id="terminalTabs" class="terminal-tabs"></div>
          </div>
          <div class="terminal-tabs-body" id="terminalTabsBody"></div>
          <div id="terminalEmpty" class="terminal-empty">
            Select nodes by double-click when <span class="kbd">Terminal</span> view is active.
          </div>
        </div>
      </section>

      <!-- Right: Details -->
      <aside class="panel details-pane">
        <h3>Details</h3>
        <div class="details-body">
          <div id="detailBody" class="detail">Select a node</div>
        </div>
      </aside>
    </main>
    <div id="edgeFloat" class="edge-float hidden"></div>

    <script src="/ui/vendor/cytoscape.min.js"></script>
    <script src="/ui/vendor/xterm.js"></script>
    <script src="/ui/vendor/xterm-addon-fit.js"></script>
    <script src="/ui/app.js"></script>
  </body>
</html>
