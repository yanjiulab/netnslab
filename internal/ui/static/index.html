<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>netnslab 拓扑可视化</title>
    <link rel="stylesheet" href="/ui/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">netnslab UI</div>

      <div class="controls">
        <label class="control">
          Lab:
          <select id="labSelect"></select>
        </label>
        <button id="refreshBtn" class="btn">刷新</button>
        <label class="control">
          <input id="autoRefresh" type="checkbox" checked />
          自动刷新
        </label>
      </div>

      <div class="meta">
        <span id="status">--</span>
      </div>
    </header>

    <main class="layout">
      <aside class="panel" id="nodesPanel">
        <h3>节点</h3>
        <div id="nodesList" class="nodes"></div>
      </aside>

      <section class="panel graph-panel">
        <div class="graph-title">
          拓扑图
          <span id="graphHint" class="hint">（MVP 圆形布局）</span>
        </div>
        <svg id="topologySvg" class="topology"></svg>
      </section>

      <aside class="panel" id="detailPanel">
        <h3>详情</h3>
        <div id="detailBody" class="detail">选择节点查看详情</div>
      </aside>
    </main>

    <script src="/ui/app.js"></script>
  </body>
</html>
