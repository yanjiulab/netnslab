<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>netnslab topology UI</title>
    <link rel="stylesheet" href="/ui/styles.css" />
    <link rel="stylesheet" href="/ui/vendor/xterm.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">netnslab UI</div>

      <div class="controls">
        <label class="control">
          Lab:
          <select id="labSelect"></select>
        </label>
        <button id="refreshBtn" class="btn">Refresh</button>
        <label class="control">
          Layout:
          <select id="layoutSelect">
            <option value="cose">cose</option>
            <option value="circle">circle</option>
            <option value="grid">grid</option>
            <option value="concentric">concentric</option>
            <option value="breadthfirst">breadthfirst</option>
          </select>
        </label>
        <button id="relayoutBtn" class="btn">Relayout</button>
        <label class="control">
          <input id="autoRefresh" type="checkbox" checked />
          Auto refresh
        </label>
        <label class="control">
          <input id="liveToggle" type="checkbox" checked />
          Live routes + TC
        </label>
      </div>

      <div class="meta">
        <span id="status">--</span>
      </div>
    </header>

    <main class="layout">
      <aside class="panel" id="nodesPanel">
        <h3>Nodes</h3>
        <div id="nodesList" class="nodes"></div>
      </aside>

      <section class="panel graph-panel">
        <div class="graph-title">
          Topology
          <span id="graphHint" class="hint">(Cytoscape layout)</span>
        </div>
        <div id="topologyGraph" class="topology"></div>
      </section>

      <aside class="panel" id="detailPanel">
        <h3>Details</h3>
        <div id="detailBody" class="detail">Select a node</div>

        <div class="terminal-cta">
          <button id="termBtn" class="btn">Open Terminal</button>
          <button id="termFsBtn" class="btn">Fullscreen</button>
        </div>

        <div id="terminalPanel" class="terminal-panel hidden">
          <div class="terminal-host" id="terminalHost"></div>
        </div>
      </aside>
    </main>

    <script src="/ui/vendor/cytoscape.min.js"></script>
    <script src="/ui/vendor/xterm.js"></script>
    <script src="/ui/vendor/xterm-addon-fit.js"></script>
    <script src="/ui/app.js"></script>
  </body>
</html>
