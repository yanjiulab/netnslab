<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>netnslab topology UI</title>
    <link rel="stylesheet" href="/ui/styles.css" />
    <link rel="stylesheet" href="/ui/ui-vendor/xterm.css" />
  </head>
  <body data-theme="light">
    <header class="topbar">
      <div class="brand">
        <img class="brand-icon" src="/ui/icon-netnslab.svg" alt="NETNSLAB" />
        <span>NETNSLAB</span>
      </div>

      <div class="controls">
        <label class="control">
          Lab:
          <select id="labSelect"></select>
        </label>
        <label class="control">
          View:
          <select id="viewModeSelect">
            <option value="topo">Topology</option>
            <option value="terminal">Terminal</option>
          </select>
        </label>
        <button id="refreshBtn" class="btn">Refresh</button>
        <label class="control">
          <input id="autoRefresh" type="checkbox" checked />
          Auto refresh
        </label>
      </div>

      <div class="meta">
        <button
          id="themeToggle"
          class="btn btn-theme"
          title="Switch to dark theme"
          aria-label="Switch to dark theme"
        >
          <span id="themeIcon" aria-hidden="true">☾</span>
        </button>
        <span id="status">--</span>
      </div>
    </header>

    <main class="fixed-layout">
      <!-- Left: Nodes -->
      <aside class="panel nodes-pane">
        <h3>Nodes</h3>
        <div id="nodesList" class="nodes"></div>
      </aside>

      <!-- Center: Topology or Terminal -->
      <section class="panel center-pane">
        <div id="topoView" class="center-view">
          <div class="graph-title">
            <div class="graph-title-main">
              Topology
              <span id="graphHint" class="hint">(Cytoscape layout)</span>
            </div>
            <div class="graph-controls">
              <label class="control">
                Layout:
                <select id="layoutSelect">
                  <option value="cose">cose</option>
                  <option value="circle">circle</option>
                  <option value="grid">grid</option>
                  <option value="concentric">concentric</option>
                  <option value="breadthfirst">breadthfirst</option>
                </select>
              </label>
              <button id="relayoutBtn" class="btn relayout-action">Relayout</button>
              <div class="export-actions" aria-label="Export topology">
                <button
                  id="exportPngBtn"
                  class="btn btn-icon btn-export"
                  title="Export topology as PNG"
                  aria-label="Export topology as PNG"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 3v10"></path>
                    <path d="M8.5 9.5 12 13l3.5-3.5"></path>
                    <rect x="4" y="14.5" width="16" height="6" rx="1.8"></rect>
                  </svg>
                </button>
                <button
                  id="exportSvgBtn"
                  class="btn btn-icon btn-export"
                  title="Export topology as SVG"
                  aria-label="Export topology as SVG"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <rect x="4" y="4.5" width="16" height="15" rx="2"></rect>
                    <path d="M8 9.5h8"></path>
                    <path d="M8 13h5"></path>
                    <path d="M13.5 16.5h2.5"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <div id="topologyGraph" class="topology"></div>
        </div>

        <div id="terminalView" class="center-view hidden">
          <div class="terminal-tabs-bar">
            <button id="openHostTerminalBtn" class="btn btn-host-terminal">Host Terminal</button>
            <label class="control control-compact terminal-theme-control">
              Theme:
              <select id="terminalThemeSelect">
                <option value="auto">Auto</option>
                <option value="dark">Dark</option>
                <option value="classic">Classic</option>
                <option value="ocean">Ocean</option>
                <option value="solarized">Solarized</option>
              </select>
            </label>
            <div id="terminalTabs" class="terminal-tabs"></div>
          </div>
          <div class="terminal-tabs-body" id="terminalTabsBody"></div>
          <div id="terminalEmpty" class="terminal-empty">
            Click host button or node terminal icon to open a terminal tab.
          </div>
        </div>
      </section>

      <!-- Right: Details -->
      <aside class="panel details-pane">
        <div class="details-head">
          <h3>Details</h3>
          <div class="details-controls">
            <label class="control control-compact">
              <input id="liveToggle" type="checkbox" checked />
              Live
            </label>
            <label class="control control-compact">
              <input id="diffToggle" type="checkbox" />
              Diff
            </label>
          </div>
        </div>
        <div class="details-body">
          <div id="detailBody" class="detail">Select a node</div>
        </div>
      </aside>
    </main>
    <div id="edgeFloat" class="edge-float hidden"></div>

    <script src="/ui/ui-vendor/cytoscape.min.js"></script>
    <script src="/ui/ui-vendor/xterm.js"></script>
    <script src="/ui/ui-vendor/xterm-addon-fit.js"></script>
    <script src="/ui/app.js"></script>
  </body>
</html>
